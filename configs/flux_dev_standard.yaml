# ============================================================================
# Flux Dev — Standard LoRA Config
# ============================================================================
# Tuned for a g5.xlarge (1x NVIDIA A10G, 24 GB VRAM).
# Parameters based on 2026 best practices for Flux LoRA likeness training.
#
# Key changes from v1/v2:
#   - LR 4e-4 (Flux needs higher LR than SDXL — 1e-4 catastrophically undertrains)
#   - Rank 32 (more capacity for facial detail)
#   - 1500 steps (Flux overfits past 1500-2000)
#   - Batch size 2 + grad accum 2 = effective batch 4 (stabilizes training)
#   - EMA disabled (not recommended for Flux)
#
# Run with:  python run.py configs/flux_dev_standard.yaml
# ============================================================================
---
job: extension
config:
  name: "carlop_standard_lora_v3"
  process:
    - type: "sd_trainer"

      training_folder: "/home/ubuntu/likeness-lab/outputs"
      device: cuda:0

      trigger_word: "CARLOP"

      # ── LoRA network settings ──────────────────────────────────────
      network:
        type: "lora"
        linear: 32                 # Rank 32 — more capacity for facial detail
        linear_alpha: 32

      # ── Checkpoint saving ──────────────────────────────────────────
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 3
        push_to_hub: false

      # ── Dataset ────────────────────────────────────────────────────
      datasets:
        - folder_path: "/home/ubuntu/likeness-lab/datasets/standard_v2"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]

      # ── Training hyperparameters ───────────────────────────────────
      train:
        batch_size: 2              # Larger batch for stable gradients
        steps: 1500                # Flux overfits past 1500-2000
        gradient_accumulation_steps: 2  # Effective batch size = 4
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 4e-4                   # Flux needs higher LR than SDXL
        dtype: bf16

      # ── Base model ─────────────────────────────────────────────────
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true
        low_vram: true

      # ── Sampling during training ───────────────────────────────────
      sample:
        sampler: "flowmatch"
        sample_every: 500
        width: 1024
        height: 1024
        prompts:
          - "a professional headshot photo of CARLOP, young man with short brown hair, clean shaven smooth skin, studio lighting"
          - "portrait of CARLOP, young man, smooth clean shaven face, walking through a city, golden hour"
          - "CARLOP, young man with short hair, clean shaven, sitting in a coffee shop, warm lighting"
          - "digital art portrait of CARLOP, young man, smooth skin, neon lighting, cyberpunk style"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 4
        sample_steps: 20

meta:
  name: "[name]"
  version: "1.0"
